<!DOCTYPE html>
<html lang="th">

<head>
    <!-- Meta พื้นฐาน -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Clock & Stopwatch | Sornsawan Portfolio</title>
    <meta name="description" content="นาฬิกาอนาล็อก ดิจิทัล และระบบจับเวลา (Stopwatch) แสดงผลแบบเรียลไทม์">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/clock.css">
</head>

<body class="clock-page">

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Portfolio<span>.</span></div>

        <nav aria-label="Main Navigation">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="game.html">Game</a></li>
                <li><a href="clock.html" class="active">Clock</a></li>
                <li><a href="about.html#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Background effect -->
    <div class="background" aria-hidden="true"></div>
    <div class="particles" aria-hidden="true"></div>

    <!-- Main content -->
    <main>
        <section class="page">

            <!-- Title -->
            <header>
                <h1 class="title">Clock & Stopwatch</h1>
                <p class="subtitle">
                    แสดงเวลาแบบอนาล็อก ดิจิทัล และจับเวลาได้แบบเรียลไทม์
                </p>
            </header>

            <div class="container">

                <!-- Analog Clock -->
                <section class="analog-clock" aria-label="นาฬิกาอนาล็อก">

                    <!-- ตัวเลขรอบหน้าปัด -->
                    <div class="number n1">1</div>
                    <div class="number n2">2</div>
                    <div class="number n3">3</div>
                    <div class="number n4">4</div>
                    <div class="number n5">5</div>
                    <div class="number n6">6</div>
                    <div class="number n7">7</div>
                    <div class="number n8">8</div>
                    <div class="number n9">9</div>
                    <div class="number n10">10</div>
                    <div class="number n11">11</div>
                    <div class="number n12">12</div>

                    <!-- เข็มนาฬิกา -->
                    <div class="hand hour" id="hour" aria-label="เข็มชั่วโมง"></div>
                    <div class="hand minute" id="minute" aria-label="เข็มนาที"></div>
                    <div class="hand second" id="second" aria-label="เข็มวินาที"></div>

                    <div class="center"></div>
                </section>

                <!-- Right Panel -->
                <aside class="right-panel">

                    <!-- Digital Clock -->
                    <article class="card">
                        <h2>Digital Clock</h2>

                        <time id="digitalTime" class="digital-time" aria-live="polite">
                            00:00:00
                        </time>

                        <p id="date"></p>
                        <p id="day"></p>
                    </article>

                    <!-- Stopwatch -->
                    <article class="card">
                        <h2>Stopwatch</h2>

                        <time id="stopwatch" aria-live="polite">
                            00:00.00
                        </time>

                        <div class="controls">
                            <button 
                                type="button" 
                                onclick="startStop()" 
                                aria-label="เริ่มหรือหยุดการจับเวลา">
                                Start / Stop
                            </button>

                            <button 
                                type="button" 
                                onclick="resetStop()" 
                                aria-label="รีเซ็ตการจับเวลา">
                                Reset
                            </button>
                        </div>
                    </article>

                </aside>

            </div>

        </section>
    </main>

    <!-- JavaScript -->
    <script src="javascript/clock.js" defer></script>

</body>
</html>
